# Tiny sentiment lexicons used by the Tier 2 baseline.
# These are SEEDS — they exist so the agent has *something* to work with on
# day one. Production work should layer NTUSD (zh) or VADER (en) on top, and
# additions belong in the per-domain `domain.yaml` rather than here.
#
# Polarity: integer in {-2, -1, 0, +1, +2}. 0 entries are intensifiers.

zh-TW:
  positive:
    - [感謝, 1]
    - [謝謝, 1]
    - [感恩, 1]
    - [幫忙, 1]
    - [互助, 1]
    - [安全, 1]
    - [平安, 1]
    - [順利, 1]
    - [成功, 1]
    - [溫暖, 1]
    - [支持, 1]
    - [振作, 1]
    - [加油, 1]
    - [太好了, 2]
    - [真的很棒, 2]
  negative:
    - [批評, -1]
    - [失望, -1]
    - [氣憤, -2]
    - [生氣, -1]
    - [憤怒, -2]
    - [慘, -1]
    - [糟糕, -1]
    - [太差, -2]
    - [可惡, -2]
    - [騙人, -2]
    - [失敗, -1]
    - [危險, -1]
    - [混亂, -1]
    - [恐慌, -2]
    - [崩潰, -2]
    - [太慢, -1]
    - [不可接受, -2]
    - [背叛, -2]
    - [拋棄, -2]
    - [災難, -2]
    - [停電, -1]
    - [缺水, -1]
    - [短缺, -1]
    - [死亡, -2]
    - [受傷, -1]
    - [被困, -1]
    - [絕望, -2]
  intensifiers:
    - [非常, 0]
    - [真的, 0]
    - [超, 0]
    - [太, 0]
  negators:
    - 不
    - 沒
    - 別
    - 無

zh:
  positive: []
  negative: []

en:
  positive:
    - [thanks, 1]
    - [thank, 1]
    - [grateful, 1]
    - [safe, 1]
    - [help, 1]
    - [helping, 1]
    - [great, 1]
    - [excellent, 2]
    - [amazing, 2]
    - [hopeful, 1]
    - [recovered, 1]
  negative:
    - [angry, -1]
    - [outraged, -2]
    - [terrible, -2]
    - [awful, -2]
    - [disaster, -2]
    - [failed, -1]
    - [failure, -1]
    - [chaos, -1]
    - [danger, -1]
    - [dangerous, -1]
    - [missing, -1]
    - [trapped, -1]
    - [death, -2]
    - [dead, -2]
    - [injured, -1]
  intensifiers:
    - [very, 0]
    - [really, 0]
    - [extremely, 0]
  negators:
    - "not"
    - "no"
    - "never"
    - "without"
