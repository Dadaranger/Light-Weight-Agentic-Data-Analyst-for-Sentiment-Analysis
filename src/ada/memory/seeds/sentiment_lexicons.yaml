# Sentiment lexicons for the Tier 2 baseline.
#
# Polarity scale:  -2 (very strong negative) … +2 (very strong positive).
# These are SEEDS — production work should layer NTUSD (zh) or VADER (en) on
# top, and per-domain additions belong in `domain.yaml` rather than here.
#
# Coverage focus: disaster / civic-discourse / social-media tone — terms a
# human would readily recognize as expressing approval, frustration, distress,
# or community sentiment.

